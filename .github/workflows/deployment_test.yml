name: Deployment Test

on:
    push:
        branches: [ "test" ]

permissions:
    contents: read

jobs:
    deploy:
        environment: Test

        runs-on: ubuntu-latest

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SERVER_URL }}
                  username: ${{ secrets.SSH_USER }}
                  password: ${{ secrets.SSH_PASSWORD }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      cd /var/www/ISEF01_FreBoMe_QA
                      git fetch
                      git checkout test
                      git pull
                      composer install

