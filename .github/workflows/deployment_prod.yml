name: Deployment
on:
    push:
        branches: [ "main" ]

permissions:
    contents: read

jobs:
    deploy:
        environment: Prod

        runs-on: ubuntu-latest

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
               host: ${{ secrets.SERVER_URL }}
               username: ${{ secrets.SSH_USER }}
               password: ${{ secrets.SSH_PASSWORD }}
               port: ${{ secrets.SSH_PORT }}
               script: |
                   cd /var/www/ISEF01_FreBoMe
                   git fetch
                   git checkout main
                   git pull
                   composer install
